<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TriageAI</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --border: #1e2530;
    --red: #ff3b3b;
    --yellow: #f5c518;
    --green: #2ddd6e;
    --black-tag: #888ea0;
    --text: #e8ecf4;
    --muted: #5a6070;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100dvh; display: flex; flex-direction: column; align-items: center; }

  header { width: 100%; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 10px; }
  .logo { font-family: var(--mono); font-size: 22px; color: var(--red); letter-spacing: 2px; }
  .logo span { color: var(--text); opacity: 0.4; font-size: 11px; letter-spacing: 1px; margin-left: 4px; }
  .tagline { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-left: auto; }

  main { width: 100%; max-width: 480px; padding: 24px 20px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

  .capture-zone { border: 1.5px dashed var(--border); border-radius: 12px; overflow: hidden; position: relative; background: var(--surface); aspect-ratio: 4/3; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: border-color 0.2s; }
  .capture-zone:hover { border-color: #2e3a4a; }
  .capture-zone.has-image { border-style: solid; border-color: #2e3a4a; }
  #preview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  .capture-zone.has-image #preview { display: block; }
  .capture-hint { display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
  .capture-zone.has-image .capture-hint { display: none; }
  .capture-icon { width: 48px; height: 48px; border: 1.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .capture-icon svg { width: 22px; height: 22px; stroke: var(--muted); fill: none; stroke-width: 1.5; }
  .capture-hint p { font-size: 13px; color: var(--muted); font-family: var(--mono); }
  #file-input { display: none; }
  .scan-overlay { position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px); }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { padding: 14px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--mono); font-size: 13px; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn:hover { border-color: #2e3a4a; background: #161b22; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { grid-column: 1 / -1; background: var(--red); border-color: var(--red); color: #fff; font-weight: 700; font-size: 14px; letter-spacing: 2px; padding: 16px; }
  .btn-primary:hover { background: #e02e2e; border-color: #e02e2e; }
  .btn-primary:disabled { background: #2a1a1a; border-color: #3a2020; color: var(--muted); cursor: not-allowed; transform: none; }

  .status { font-family: var(--mono); font-size: 12px; color: var(--muted); text-align: center; min-height: 18px; letter-spacing: 1px; }
  .status.loading { color: var(--yellow); }
  .status.error { color: var(--red); }

  .result-card { border-radius: 12px; border: 1.5px solid var(--border); overflow: hidden; display: none; }
  .result-card.visible { display: block; }
  .result-header { padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
  .triage-badge { font-family: var(--mono); font-size: 20px; font-weight: 700; letter-spacing: 3px; padding: 6px 14px; border-radius: 6px; }
  .badge-RED    { background: #2a0a0a; color: var(--red);      border: 1px solid #4a1515; }
  .badge-YELLOW { background: #252000; color: var(--yellow);    border: 1px solid #3d3500; }
  .badge-GREEN  { background: #0a2015; color: var(--green);     border: 1px solid #1a4030; }
  .badge-BLACK  { background: #181a1f; color: var(--black-tag); border: 1px solid #2a2d35; }
  .result-label { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .result-divider { height: 1px; background: var(--border); margin: 0 18px; }
  .result-body { padding: 0 18px 18px; display: flex; flex-direction: column; gap: 14px; }
  .result-section label { display: block; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
  .result-section p { font-size: 14px; line-height: 1.6; color: var(--text); }
  .result-raw { background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: var(--mono); font-size: 12px; color: var(--text); white-space: pre-wrap; line-height: 1.6; }

  /* Hospital section */
  .hospital-section { border-top: 1px solid var(--border); padding: 16px 18px 18px; display: none; }
  .hospital-section.visible { display: block; }
  .hospital-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .hospital-header-icon { width: 8px; height: 8px; background: var(--red); border-radius: 50%; animation: pulse-dot 1s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }
  .hospital-title { font-family: var(--mono); font-size: 11px; color: var(--red); letter-spacing: 2px; text-transform: uppercase; }
  .location-status { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 10px; }

  /* City picker */
  .city-picker-wrap { margin-bottom: 14px; }
  .city-picker-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; display: block; }
  .city-select {
    width: 100%;
    background: #0d1117;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 14px;
    appearance: none;
    cursor: pointer;
    outline: none;
  }
  .city-select:focus { border-color: var(--red); }

  .hospital-card { background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 6px; }
  .hospital-card:last-child { margin-bottom: 0; }
  .hospital-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .hospital-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .hospital-dist { font-family: var(--mono); font-size: 11px; color: var(--yellow); letter-spacing: 1px; }
  .hospital-type { font-size: 11px; color: var(--muted); background: var(--surface); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); }
  .hospital-city { font-size: 11px; color: var(--muted); }
  .call-btn { display: flex; align-items: center; gap: 8px; background: #1a0a0a; border: 1px solid #4a1515; border-radius: 6px; color: var(--red); font-family: var(--mono); font-size: 12px; letter-spacing: 1px; padding: 8px 12px; cursor: pointer; text-decoration: none; width: fit-content; transition: background 0.15s; margin-top: 2px; }
  .call-btn:hover { background: #2a1010; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .pulsing { animation: pulse 1.2s ease-in-out infinite; }
</style>
</head>
<body>

<header>
  <div class="logo">TRIAGE<span>AI</span></div>
  <div class="tagline">START Protocol</div>
</header>

<main>
  <div class="capture-zone" id="capture-zone" onclick="document.getElementById('file-input').click()">
    <img id="preview" alt="Patient image preview">
    <div class="scan-overlay"></div>
    <div class="capture-hint">
      <div class="capture-icon">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <p>TAP TO CAPTURE / UPLOAD</p>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*" capture="environment">

  <div class="btn-row">
    <button class="btn" onclick="document.getElementById('file-input').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      UPLOAD
    </button>
    <button class="btn" onclick="clearImage()">CLEAR</button>
    <button class="btn-primary btn" id="triage-btn" onclick="runTriage()" disabled>▶ RUN TRIAGE</button>
  </div>

  <div class="status" id="status"></div>

  <div class="result-card" id="result-card">
    <div class="result-header">
      <div class="triage-badge" id="triage-badge">—</div>
      <div class="result-label">Triage Assessment</div>
    </div>
    <div class="result-divider"></div>
    <div class="result-body">
      <div class="result-section">
        <label>Reason</label>
        <p id="result-reason">—</p>
      </div>
      <div class="result-section">
        <label>Immediate Action</label>
        <p id="result-action">—</p>
      </div>
      <div class="result-section">
        <label>Raw Model Output</label>
        <div class="result-raw" id="result-raw"></div>
      </div>
    </div>

    <div class="hospital-section" id="hospital-section">
      <div class="hospital-header">
        <div class="hospital-header-icon"></div>
        <div class="hospital-title" id="hospital-title">Nearest Hospitals</div>
      </div>

      <!-- City picker -->
      <div class="city-picker-wrap" id="city-picker-wrap">
        <span class="city-picker-label">Select current city</span>
        <select class="city-select" id="city-select" onchange="onCitySelected(this.value)">
          <option value="">— Choose city —</option>
          <option value="28.6139|77.2090|New Delhi">New Delhi</option>
          <option value="28.4089|77.3178|Faridabad">Faridabad</option>
          <option value="28.4595|77.0266|Gurugram">Gurugram</option>
          <option value="28.5706|77.3210|Noida">Noida</option>
          <option value="19.0760|72.8777|Mumbai">Mumbai</option>
          <option value="12.9716|77.5946|Bangalore">Bangalore</option>
          <option value="13.0827|80.2707|Chennai">Chennai</option>
          <option value="17.3850|78.4867|Hyderabad">Hyderabad</option>
          <option value="22.5726|88.3639|Kolkata">Kolkata</option>
          <option value="18.5204|73.8567|Pune">Pune</option>
          <option value="26.9124|75.7873|Jaipur">Jaipur</option>
          <option value="23.0225|72.5714|Ahmedabad">Ahmedabad</option>
          <option value="26.8467|80.9462|Lucknow">Lucknow</option>
          <option value="30.7333|76.7794|Chandigarh">Chandigarh</option>
          <option value="23.1993|77.3174|Bhopal">Bhopal</option>
          <option value="22.7196|75.8577|Indore">Indore</option>
          <option value="21.1458|79.0882|Nagpur">Nagpur</option>
          <option value="25.5941|85.1376|Patna">Patna</option>
          <option value="25.3176|82.9739|Varanasi">Varanasi</option>
          <option value="30.9010|75.8573|Ludhiana">Ludhiana</option>
          <option value="31.6340|74.8723|Amritsar">Amritsar</option>
          <option value="30.3165|78.0322|Dehradun">Dehradun</option>
          <option value="26.1445|91.7362|Guwahati">Guwahati</option>
          <option value="20.2961|85.8245|Bhubaneswar">Bhubaneswar</option>
          <option value="10.8505|76.2711|Kochi">Kochi</option>
          <option value="8.5241|76.9366|Thiruvananthapuram">Thiruvananthapuram</option>
          <option value="11.0168|76.9558|Coimbatore">Coimbatore</option>
          <option value="16.5062|80.6480|Vijayawada">Vijayawada</option>
          <option value="21.1702|72.8311|Surat">Surat</option>
          <option value="32.7266|74.8570|Jammu">Jammu</option>
          <option value="34.0837|74.8071|Srinagar">Srinagar</option>
        </select>
      </div>

      <div class="location-status" id="location-status"></div>
      <div id="hospital-list"></div>
    </div>
  </div>
</main>

<script>
  let HOSPITALS = [];

  async function loadHospitals() {
    try {
      const res = await fetch('/hospitals.json');
      HOSPITALS = await res.json();
    } catch (e) {
      console.warn('Could not load hospitals.json', e);
    }
  }

  loadHospitals();

  function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2)**2;
    return R * 2 * Math.asin(Math.sqrt(a));
  }

  function getNearestHospitals(lat, lng, n = 3) {
    return HOSPITALS
      .map(h => ({ ...h, distKm: haversineKm(lat, lng, h.lat, h.lng) }))
      .sort((a, b) => a.distKm - b.distKm)
      .slice(0, n);
  }

  function renderHospitals(hospitals, locationLabel) {
    document.getElementById('location-status').textContent = '📍 ' + locationLabel;
    document.getElementById('hospital-list').innerHTML = hospitals.map(h => `
      <div class="hospital-card">
        <div class="hospital-name">${h.name}</div>
        <div class="hospital-meta">
          <span class="hospital-dist">${h.distKm.toFixed(1)} km away</span>
          <span class="hospital-type">${h.type}</span>
          <span class="hospital-city">${h.city}</span>
        </div>
        <a class="call-btn" href="tel:${h.phone}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          CALL ${h.phone}
        </a>
      </div>
    `).join('');
  }

  function onCitySelected(val) {
    if (!val) return;
    const [lat, lng, label] = val.split('|');
    const nearest = getNearestHospitals(parseFloat(lat), parseFloat(lng), 3);
    renderHospitals(nearest, label);
    document.getElementById('city-picker-wrap').style.display = 'none';
  }

  function showHospitals(color) {
    document.getElementById('hospital-section').classList.add('visible');
    document.getElementById('hospital-title').textContent =
      color === 'RED'
        ? 'Nearest Hospitals — Immediate Dispatch'
        : 'Nearest Hospitals — Transport When Stable';
    document.getElementById('city-picker-wrap').style.display = 'block';
    document.getElementById('city-select').value = '';
    document.getElementById('location-status').textContent = '';
    document.getElementById('hospital-list').innerHTML = '';
  }

  let selectedFile = null;

  document.getElementById('file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = function(ev) {
      document.getElementById('preview').src = ev.target.result;
      document.getElementById('capture-zone').classList.add('has-image');
      document.getElementById('triage-btn').disabled = false;
      document.getElementById('result-card').classList.remove('visible');
      document.getElementById('hospital-section').classList.remove('visible');
      setStatus('');
    };
    reader.readAsDataURL(file);
  });

  function clearImage() {
    selectedFile = null;
    document.getElementById('file-input').value = '';
    document.getElementById('preview').src = '';
    document.getElementById('capture-zone').classList.remove('has-image');
    document.getElementById('triage-btn').disabled = true;
    document.getElementById('result-card').classList.remove('visible');
    document.getElementById('hospital-section').classList.remove('visible');
    setStatus('');
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  async function runTriage() {
    if (!selectedFile) return;
    const btn = document.getElementById('triage-btn');
    btn.disabled = true;
    setStatus('ANALYZING PATIENT...', 'loading');
    btn.classList.add('pulsing');

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch('/triage', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.error) { setStatus('ERROR: ' + data.error, 'error'); return; }
      const color = parseAndDisplay(data.result);
      if (color === 'RED' || color === 'YELLOW') showHospitals(color);
      setStatus('');
    } catch (err) {
      setStatus('CONNECTION ERROR — is the server running?', 'error');
    } finally {
      btn.disabled = false;
      btn.classList.remove('pulsing');
    }
  }

  function parseAndDisplay(raw) {
    const colorMatch = raw.match(/TRIAGE\s+COLOR[:\s]+\*{0,2}(RED|YELLOW|GREEN|BLACK)\*{0,2}/i);
    const color = colorMatch ? colorMatch[1].toUpperCase() : 'UNKNOWN';
    const reasonMatch = raw.match(/REASON[:\s]+(.+?)(?=\n.*ACTION|$)/is);
    const reason = reasonMatch ? reasonMatch[1].replace(/\*+/g, '').trim() : '—';
    const actionMatch = raw.match(/IMMEDIATE\s+ACTION[:\s]+(.+?)(?=\n|$)/is);
    const action = actionMatch ? actionMatch[1].replace(/\*+/g, '').trim() : '—';

    const badge = document.getElementById('triage-badge');
    badge.textContent = color;
    badge.className = 'triage-badge badge-' + color;
    document.getElementById('result-reason').textContent = reason;
    document.getElementById('result-action').textContent = action;
    document.getElementById('result-raw').textContent = raw;
    document.getElementById('result-card').classList.add('visible');
    return color;
  }
</script>
</body>
</html>
