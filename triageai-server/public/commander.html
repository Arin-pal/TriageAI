<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TriageAI Commander</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  
  <style>
    :root {
      --color-bg: #0a0a0a;
      --color-surface: #1a1a1a;
      --color-border: #333;
      --color-text: #ffffff;
      --color-text-muted: #a0a0a0;
      
      --color-red: #CC0000;
      --color-yellow: #E6A817;
      --color-green: #1A7A1A;
      --color-black: #222222;
      --color-blue: #0055CC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .header-title { font-size: 1.5rem; font-weight: 800; color: var(--color-red); }
    
    .summary-counts {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .badge-red { background: var(--color-red); color: white; }
    .badge-yellow { background: var(--color-yellow); color: black; }
    .badge-green { background: var(--color-green); color: white; }
    .badge-black { background: var(--color-black); color: white; }
    .badge-blue { background: var(--color-blue); color: white; }

    .header-actions { display: flex; gap: 12px; align-items: center; }
    button {
      background: #333; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold;
    }
    button:hover { background: #444; }
    button.danger { background: var(--color-red); }

    .main-content {
      display: flex;
      flex-grow: 1;
      overflow: hidden;
    }

    #map {
      position: absolute;
      top: 60px;
      bottom: 0;
      left: 0;
      width: 60%;
      border-right: 1px solid var(--color-border);
      background: #111;
      z-index: 1;
    }

    .sidebar {
      margin-left: 60%;
      width: 40%;
      height: calc(100vh - 60px);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    h2 { font-size: 1.25rem; margin-bottom: 16px; color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); padding-bottom: 8px; }

    .grid { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 16px;
      border-left: 6px solid #444;
    }
    
    .card.red { border-left-color: var(--color-red); }
    .card.yellow { border-left-color: var(--color-yellow); }
    .card.green { border-left-color: var(--color-green); }
    .card.black { border-left-color: var(--color-black); }
    .card.blue { border-left-color: var(--color-blue); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .card-title { font-weight: bold; font-size: 1.1rem; }
    .card-meta { font-size: 0.85rem; color: var(--color-text-muted); }
    .card-reason { font-size: 0.9rem; color: #ccc; margin-bottom: 12px; }
    
    select {
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 6px;
      border-radius: 4px;
      width: 100%;
    }

    /* Leaflet popup dark theme fixes */
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: var(--color-surface);
      color: var(--color-text);
    }
    .leaflet-container a.leaflet-popup-close-button {
      color: var(--color-text-muted);
    }
    .leaflet-popup-content b {
      color: white;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title">TriageAI Commander</div>
    <div class="summary-counts" id="summary-counts">
      <div class="badge badge-red">RED 0</div>
      <div class="badge badge-yellow">YELLOW 0</div>
      <div class="badge badge-green">GREEN 0</div>
      <div class="badge badge-black">BLACK 0</div>
      <div class="badge badge-blue" style="margin-left: 16px;">Volunteers 0</div>
    </div>
    <div class="header-actions">
      <label style="display: flex; align-items: center; gap: 6px; font-size: 0.9rem;">
        <input type="checkbox" id="auto-refresh" checked> Auto-refresh (5s)
      </label>
      <button class="danger" onclick="clearAllData()">Clear All</button>
    </div>
  </header>

  <div class="main-content">
    <div id="map"></div>
    <div class="sidebar">
      <div>
        <h2>Recent Patients</h2>
        <div class="grid" id="patients-grid"></div>
      </div>
      <div>
        <h2>Available Volunteers</h2>
        <div class="grid" id="volunteers-grid"></div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <script>
    // Initialize Map
    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Fix for Leaflet rendering in dynamic layouts
    setTimeout(() => { map.invalidateSize(); }, 100);

    let mapCentered = false;
    let markersLayer = L.layerGroup().addTo(map);
    let refreshInterval;

    const COLORS = {
      'RED': '#CC0000',
      'YELLOW': '#E6A817',
      'GREEN': '#1A7A1A',
      'BLACK': '#222222',
      'BLUE': '#0055CC'
    };

    function timeAgo(ms) {
      const seconds = Math.floor((Date.now() - ms) / 1000);
      if (seconds < 60) return `${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      return `${hours}h ago`;
    }

    function createCircleMarker(lat, lng, colorStr) {
      return L.circleMarker([lat, lng], {
        radius: 8,
        fillColor: COLORS[colorStr] || '#888',
        color: '#fff',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.9
      });
    }

    async function fetchData() {
      try {
        const pRes = await fetch('/patients');
        const vRes = await fetch('/volunteers');
        
        const patients = await pRes.json();
        const volunteers = await vRes.json();
        
        renderDashboard(patients, volunteers);
      } catch (err) {
        console.error('Failed to fetch data', err);
      }
    }

    function renderDashboard(patients, volunteers) {
      // 1. Update Counts
      const counts = { RED: 0, YELLOW: 0, GREEN: 0, BLACK: 0 };
      patients.forEach(p => { if (counts[p.color] !== undefined) counts[p.color]++; });
      
      document.getElementById('summary-counts').innerHTML = `
        <div class="badge badge-red">RED ${counts.RED}</div>
        <div class="badge badge-yellow">YELLOW ${counts.YELLOW}</div>
        <div class="badge badge-green">GREEN ${counts.GREEN}</div>
        <div class="badge badge-black">BLACK ${counts.BLACK}</div>
        <div class="badge badge-blue" style="margin-left: 16px;">Volunteers ${volunteers.length}</div>
      `;

      // 2. Clear Markers
      markersLayer.clearLayers();

      // 3. Render Patients
      const pGrid = document.getElementById('patients-grid');
      pGrid.innerHTML = '';
      
      let firstGPS = null;

      patients.forEach(p => {
        // Map Marker
        if (p.lat && p.lng) {
          if (!firstGPS && !mapCentered) firstGPS = [p.lat, p.lng];
          
          const marker = createCircleMarker(p.lat, p.lng, p.color);
          marker.bindPopup(`
            <div style="font-weight:bold; color:${COLORS[p.color]}; margin-bottom:4px;">${p.color} - ${timeAgo(p.timestamp)}</div>
            <div>${p.action}</div>
          `);
          markersLayer.addLayer(marker);
        }

        // Sidebar Card
        const volOptions = volunteers.map(v => `<option value="${v.id}">${v.skills.join(', ')} (${timeAgo(v.timestamp)})</option>`).join('');
        
        pGrid.innerHTML += `
          <div class="card ${p.color.toLowerCase()}">
            <div class="card-header">
              <div class="card-title">${p.action}</div>
              <div class="card-meta">${timeAgo(p.timestamp)} | ${p.lat ? 'Has GPS' : 'No GPS'}</div>
            </div>
            <div class="card-reason">${p.reasoning}</div>
            <select>
              <option value="">Assign Volunteer...</option>
              ${volOptions}
            </select>
          </div>
        `;
      });

      // 4. Render Volunteers
      const vGrid = document.getElementById('volunteers-grid');
      vGrid.innerHTML = '';

      volunteers.forEach(v => {
        if (v.lat && v.lng) {
          const marker = createCircleMarker(v.lat, v.lng, 'BLUE');
          marker.bindPopup(`
            <div style="font-weight:bold; color:var(--color-blue); margin-bottom:4px;">Volunteer</div>
            <div>Skills: ${v.skills.join(', ')}</div>
            <div style="font-size:0.8rem; margin-top:4px;">${v.note || ''}</div>
          `);
          markersLayer.addLayer(marker);
        }

        vGrid.innerHTML += `
          <div class="card blue">
            <div class="card-header">
              <div class="card-title">${v.skills.join(', ')}</div>
              <div class="card-meta">${timeAgo(v.timestamp)}</div>
            </div>
            ${v.note ? `<div class="card-reason">"${v.note}"</div>` : ''}
          </div>
        `;
      });

      // 5. Center Map
      if (firstGPS && !mapCentered) {
        map.setView(firstGPS, 15);
        mapCentered = true;
      }
    }

    async function clearAllData() {
      if (confirm('Delete all patient records? This cannot be undone.')) {
        await fetch('/patients', { method: 'DELETE' });
        fetchData();
      }
    }

    // Polling setup
    function setupPolling() {
      const chk = document.getElementById('auto-refresh');
      if (chk.checked) {
        refreshInterval = setInterval(fetchData, 5000);
      }
      chk.addEventListener('change', (e) => {
        if (e.target.checked) {
          fetchData();
          refreshInterval = setInterval(fetchData, 5000);
        } else {
          clearInterval(refreshInterval);
        }
      });
    }

    // Initial load
    fetchData();
    setupPolling();
  </script>
</body>
</html>
